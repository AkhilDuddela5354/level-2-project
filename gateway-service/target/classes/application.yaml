spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      mvc:
        enabled: false
      routes:
        # Auth routes to turbine-service
        - id: auth-service
          uri: http://turbine-service:8080
          predicates:
            - Path=/api/auth/**
          order: 1
        # Turbine CRUD routes
        - id: turbine-service
          uri: http://turbine-service:8080
          predicates:
            - Path=/api/turbines/**
          order: 2
        # Telemetry routes
        - id: telemetry-service
          uri: http://telemetry-service:8080
          predicates:
            - Path=/api/telemetry/**
          order: 3
        # Alert routes
        - id: alert-service
          uri: http://alert-service:8080
          predicates:
            - Path=/api/alerts/**
          order: 4
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders: "*"
            maxAge: 3600

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  health:
    defaults:
      enabled: true

logging:
  level:
    com.greenko: DEBUG
    org.springframework.cloud.gateway: DEBUG
